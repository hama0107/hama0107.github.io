<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Louvre Contact</title>
<link rel="stylesheet" href="css/contact.css">
</head>
<body>
<div class="box">
<header>
    <img src="images/contact.jpg" alt="Louvre Museum">
    <h1 class="site-title">Contact Us</h1>

    <nav>
        <ul>
            <li><a href="index.html">HOME</a></li>
            <li><a href="story.html">STORY</a></li>
            <li><a href="contact.html">CONTACT</a></li>
        </ul>
    </nav>
</header>

<main>
<section class="form">
<h2>Contact to learn more</h2>

<p>
If you would like to learn more about the Louvre Museum and its famous artworks,
please fill out the form below.
</p>
<form action="test.html" method="get">
    <div>
        <label for="fname">First Name</label>
        <input id="fname" type="text" name="firstname">

        <label for="lname">Last Name</label>
        <input id="lname" type="text" name="lastname">

        <label for="email">Your Email</label>
        <input id="email" type="text" name="email">

        <label for="message">Your Message</label>
        <textarea id="message" name="message"></textarea>
    </div>

    <div>
        <h3>Would you like to visit the Louvre?</h3>
        <label for="yes">Yes</label>
        <input id="yes" type="radio" name="yesornoormaybe" value="yes">

        <label for="no">No</label>
        <input id="no" type="radio" name="yesornoormaybe" value="no">

        <label for="maybe">Maybe</label>
        <input id="maybe" type="radio" name="yesornoormaybe" value="maybe">
    </div>

    <div>
        <button type="submit">SEND</button>
    </div>
    
</form>
</section>
</div>
</main>
<footer>
    <p>&copy; Iryna Hamadyn</p>
</footer>

</body>
</html>
